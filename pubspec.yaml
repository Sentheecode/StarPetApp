name: star_pet
description: "星宠 - 日式像素风宠物社交App"
publish_to: 'none'
version: 3.0.8

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # 状态管理
  provider: ^6.1.2
  
  # 数据持久化
  sqflite: ^2.4.1
  path: ^1.9.0
  supabase_flutter: ^2.0.0
  shared_preferences: ^2.2.2
  
  # 网络
  http: ^1.2.2
  cached_network_image: ^3.4.1
  
  # 图片
  image_picker: ^1.1.2
  
  # UI 组件
  flutter_staggered_grid_view: ^0.7.0
  shimmer: ^3.0.0
  
  # 工具
  intl: ^0.20.2
  uuid: ^4.5.1
  url_launcher: ^6.2.5
  geolocator: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/pets/cat/british_short/
